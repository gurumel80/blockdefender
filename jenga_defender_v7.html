<script>
function waitForThree(cb){
  if(typeof THREE!=='undefined') cb();
  else setTimeout(()=>waitForThree(cb),50);
}
waitForThree(function(){
(function(){
const gc=document.getElementById('gc');
const cv=document.getElementById('cv');
const hud=document.getElementById('hud');
const scEl=document.getElementById('sc');
const lvEl=document.getElementById('lv');
const incEl=document.getElementById('inc');
const sfbEl=document.getElementById('sfb');
const tmEl=document.getElementById('tm');
const overlay=document.getElementById('overlay');

// ---- AUDIO ENGINE ----
let au=null;
function getAu(){
  if(!au) au=new (window.AudioContext||window.webkitAudioContext)();
  return au;
}
function playClack(vol){
  const c=getAu(), t=c.currentTime, g=c.createGain(), f=c.createBiquadFilter();
  f.type='highpass'; f.frequency.value=800+Math.random()*400;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol*0.15,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  const n=c.createBufferSource(), b=c.createBuffer(1,c.sampleRate*0.05,c.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  n.buffer=b; n.connect(f); f.connect(g); g.connect(c.destination); n.start();
}
function playImpact(type){
  const c=getAu(), t=c.currentTime, g=c.createGain(), f=c.createBiquadFilter();
  if(type==='cannonball'){
    f.type='lowpass'; f.frequency.value=500;
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  } else if(type==='ball'){
    f.type='bandpass'; f.frequency.value=300;
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  } else {
    f.type='highpass'; f.frequency.value=1200;
    g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  }
  const n=c.createBufferSource(), b=c.createBuffer(1,c.sampleRate*0.5,c.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  n.buffer=b; n.connect(f); f.connect(g); g.connect(c.destination); n.start();
}
function playWhizz(){
  const c=getAu(), t=c.currentTime, o=c.createOscillator(), g=c.createGain();
  o.type='sine'; o.frequency.setValueAtTime(1200,t); o.frequency.exponentialRampToValueAtTime(400,t+0.4);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.04,t+0.05); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  o.connect(g); g.connect(c.destination); o.start(); o.stop(t+0.4);
}
function playDeflect(){
  const c=getAu(), t=c.currentTime, o=c.createOscillator(), g=c.createGain();
  o.type='square'; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.1);
  g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(g); g.connect(c.destination); o.start(); o.stop(t+0.15);
}
function playFanfare(){
  const c=getAu(), t=c.currentTime;
  [523, 659, 784, 1047].forEach((f,i)=>{
    const o=c.createOscillator(), g=c.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(f, t+i*0.12);
    g.gain.setValueAtTime(0.15, t+i*0.12); g.gain.exponentialRampToValueAtTime(0.001, t+i*0.12+0.6);
    o.connect(g); g.connect(c.destination); o.start(t+i*0.12); o.stop(t+i*0.12+0.6);
  });
}

// ---- LEADERBOARD ----
const LB_KEY='block_defender_lb_v1';
function getLB(){ return JSON.parse(localStorage.getItem(LB_KEY)||'[]'); }
function saveScore(name, score){
  let lb=getLB();
  lb.push({name: name.trim().toUpperCase()||'OPERATOR', score});
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem(LB_KEY, JSON.stringify(lb.slice(0,5)));
}
function renderLB(){
  const lb=getLB();
  if(!lb.length) return `<div style="color:#666;font-size:12px;">NO DATA RECORDED</div>`;
  return `
    <div style="color:#ccc;font-size:11px;margin-bottom:10px;letter-spacing:2px;font-weight:bold;">TOP_OPERATORS:</div>
    <div style="width:240px;margin-bottom:20px;">
      ${lb.map((e,i)=>`<div style="display:flex;justify-content:space-between;color:${i===0?'#f0c040':'#fff'};font-size:14px;border-bottom:1px solid #222;padding:4px 0;"><span>${i+1}. ${e.name}</span><span>${e.score}</span></div>`).join('')}
    </div>`;
}

let W=gc.clientWidth, H=gc.clientHeight;
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.setClearColor(0x1a1a2e);

const scene=new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);
const camera=new THREE.PerspectiveCamera(50,W/H,0.1,200);
// Camera: pulled back, looking straight at tower
camera.position.set(0,14,30);
camera.lookAt(0,6,0);

scene.add(new THREE.AmbientLight(0xffffff,0.55));
const sun=new THREE.DirectionalLight(0xfff5e0,1.1);
sun.position.set(5,14,6); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-10;sun.shadow.camera.right=10;
sun.shadow.camera.top=20;sun.shadow.camera.bottom=-2;
scene.add(sun);
const fillL = new THREE.DirectionalLight(0x8899ff, 0.25);
fillL.position.set(-4, 3, -4);
scene.add(fillL);

// Floor
const floorM=new THREE.Mesh(new THREE.PlaneGeometry(100,100),new THREE.MeshStandardMaterial({color:0x080810,roughness:0.9}));
floorM.rotation.x=-Math.PI/2; floorM.receiveShadow=true; scene.add(floorM);
// Table
const tableM=new THREE.Mesh(new THREE.BoxGeometry(20,0.4,20),new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.7,metalness:0.2}));
tableM.position.set(0,-0.125,0); tableM.receiveShadow=true; tableM.castShadow=true; scene.add(tableM);

const BW=6.0, BH=2.0, BD=2.0;
const GROUND_Y=BH/2;
const woods=[0xf0c040,0xd97706,0x92400e,0x7c2d12,0x451a03]; 

let blocks=[], projectiles=[], shieldGrp=null;
let mx=W/2, my=H/2;
let running=false, gameOver=false, levelTime=0, currentShieldZ=5;
let score=0, level=1, towerType='jenga';
let shieldCD=0, shotClock=0, nextShot=2200, lastT=0, incT=0, raf=null;

// ---- TOWER BUILDS ----
function mkBlock(x,y,z,ry=0){
  const mesh=new THREE.Mesh(
    new THREE.BoxGeometry(BW,BH,BD),
    new THREE.MeshStandardMaterial({color:woods[Math.floor(Math.random()*woods.length)],roughness:0.75,metalness:0.05})
  );
  mesh.position.set(x,y,z); mesh.rotation.y=ry;
  mesh.castShadow=true; mesh.receiveShadow=true;
  scene.add(mesh);
  return {mesh,vx:0,vy:0,vz:0,rx:0,ry:0,rz:0,alive:true,moving:false};
}
function buildJenga(){
  const spacing = BD + 0.02; // space blocks side-by-side
  for(let r=0;r<6;r++){
    const y=GROUND_Y+r*BH, h=r%2===0;
    for(let c=0;c<3;c++){
      const o=(c-1)*spacing;
      // Alternating layers: Row 1 along X, Row 2 along Z
      blocks.push(h?mkBlock(0,y,o,0):mkBlock(o,y,0,Math.PI/2));
    }
  }
}
function buildPyramid(){
  for(let li=0;li<5;li++){
    const n=5-li, y=GROUND_Y+li*BH, half=(n-1)*(BW+0.08)/2;
    for(let i=0;i<n;i++) blocks.push(mkBlock(-half+i*(BW+0.08),y,0));
  }
}
function buildSuperTower(){
  for(let r=0;r<5;r++){
    const y=GROUND_Y+r*BH, ry=r%2?Math.PI/2:0;
    for(let c=0;c<3;c++){
      const o=(c-1)*(BW/3+0.06);
      blocks.push(r%2===0?mkBlock(o,y,0,ry):mkBlock(0,y,o,ry));
    }
  }
}
function buildBridge(){
  const s=BW*0.75;
  for(let r=0;r<6;r++){
    blocks.push(mkBlock(-s,GROUND_Y+r*BH,0)); blocks.push(mkBlock(s,GROUND_Y+r*BH,0));
  }
  for(let i=0;i<3;i++) blocks.push(mkBlock((i-1)*s,GROUND_Y+6*BH,0));
}
function buildRoundTower(){
  const radius = 5.0;
  for(let r=0;r<6;r++){
    const y=GROUND_Y+r*BH, off=(r%2)*(Math.PI/4);
    for(let i=0;i<4;i++){
      const a=(i/4)*Math.PI*2+off;
      blocks.push(mkBlock(Math.cos(a)*radius,y,Math.sin(a)*radius,-a));
    }
  }
}
function buildSpiralTower(){
  for(let r=0;r<8;r++){
    const y=GROUND_Y+r*BH, a=r*0.4;
    blocks.push(mkBlock(Math.cos(a)*2.0,y,Math.sin(a)*2.0,-a));
    blocks.push(mkBlock(Math.cos(a+Math.PI)*2.0,y,Math.sin(a+Math.PI)*2.0,-a));
  }
}
function buildTwinTowers(){
  const spacing = BD + 0.02;
  for(let r=0;r<5;r++){
    const y=GROUND_Y+r*BH, h=r%2===0;
    for(let c=0;c<3;c++){
      const o=(c-1)*spacing;
      blocks.push(h?mkBlock(-4,y,o,0):mkBlock(-4+o,y,0,Math.PI/2));
      blocks.push(h?mkBlock(4,y,o,0):mkBlock(4+o,y,0,Math.PI/2));
    }
  }
}
function buildFortress(){
  for(let r=0;r<5;r++) for(let c=0;c<3;c++) blocks.push(mkBlock((c-1)*(BW+0.2),GROUND_Y+r*BH,0));
}
function buildOctagon(){
  const radius = 6.0;
  for(let r=0; r<5; r++){
    const y = GROUND_Y + r*BH;
    const offset = (r%2) * (Math.PI/8);
    for(let i=0; i<8; i++){
      const a = (i * Math.PI/4) + offset;
      blocks.push(mkBlock(Math.cos(a)*radius, y, Math.sin(a)*radius, -a));
    }
  }
}
function buildZigZag(){
  for(let r=0; r<7; r++){
    const y = GROUND_Y + r*BH;
    const ry = (r % 2 === 0) ? Math.PI/4 : -Math.PI/4;
    blocks.push(mkBlock(0, y, 0, ry));
  }
}
function buildCross(){
  for(let r=0; r<7; r++){
    const y = GROUND_Y + r*BH;
    blocks.push(mkBlock(0,y,0,0));
    if(r >= 2 && r <= 4){
      blocks.push(mkBlock(-(BW*0.8),y,0,0));
      blocks.push(mkBlock(BW*0.8,y,0,0));
      blocks.push(mkBlock(0,y,-(BW*0.8),Math.PI/2));
      blocks.push(mkBlock(0,y,BW*0.8,Math.PI/2));
    }
  }
}
function buildCage(){
  const s = BW * 0.65;
  for(let r=0; r<4; r++){
    const y = GROUND_Y + r*BH;
    blocks.push(mkBlock(-s, y, -s, 0)); blocks.push(mkBlock(s, y, -s, 0));
    blocks.push(mkBlock(-s, y, s, 0));  blocks.push(mkBlock(s, y, s, 0));
  }
  blocks.push(mkBlock(0, GROUND_Y+4*BH, -s, 0)); blocks.push(mkBlock(0, GROUND_Y+4*BH, s, 0));
  blocks.push(mkBlock(-s, GROUND_Y+5*BH, 0, Math.PI/2)); blocks.push(mkBlock(s, GROUND_Y+5*BH, 0, Math.PI/2));
}

function buildTower(){
  blocks.forEach(b=>scene.remove(b.mesh)); blocks=[];
  if(towerType==='pyramid') buildPyramid();
  else if(towerType==='tower') buildSuperTower();
  else if(towerType==='bridge') buildBridge();
  else if(towerType==='wall') buildFortress();
  else if(towerType==='round') buildRoundTower();
  else if(towerType==='spiral') buildSpiralTower();
  else if(towerType==='twin') buildTwinTowers();
  else if(towerType==='octagon') buildOctagon();
  else if(towerType==='zigzag') buildZigZag();
  else if(towerType==='cross') buildCross();
  else if(towerType==='cage') buildCage();
  else buildJenga();

  // Calculate dynamic shield and camera positioning based on tower depth
  let maxZ = 0;
  blocks.forEach(b => {
    b.mesh.updateMatrixWorld();
    const box = new THREE.Box3().setFromObject(b.mesh);
    if(box.max.z > maxZ) maxZ = box.max.z;
  });
  
  currentShieldZ = maxZ + 5.0; // Shield sits ~2.5 block depths in front of tower
  camera.position.z = currentShieldZ + 22; // Camera follows shield distance
}

// ---- SHIELD ----
function buildShield(){
  if(shieldGrp) scene.remove(shieldGrp);
  shieldGrp=new THREE.Group();
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(1.2,0.12,16,64),
    new THREE.MeshStandardMaterial({color:0x42a5f5,emissive:0x00ffff,emissiveIntensity:1.5,metalness:0.8,roughness:0.1})
  );
  const face=new THREE.Mesh(
    new THREE.CircleGeometry(1.1,48),
    new THREE.MeshStandardMaterial({color:0x00ccff,transparent:true,opacity:0.4,side:THREE.DoubleSide,depthWrite:false})
  );
  shieldGrp.add(ring); shieldGrp.add(face);
  // Start shield in front of camera view centre
  shieldGrp.position.set(0,4,currentShieldZ);
  scene.add(shieldGrp);
}

// Map mouse to world position on the shield plane (Z=9, between camera at 18 and tower at 0)
function updateShieldPos(){
  const rect=cv.getBoundingClientRect();
  const nx=(mx-rect.left)/rect.width*2-1;
  const ny=-((my-rect.top)/rect.height)*2+1;
  const vec=new THREE.Vector3(nx,ny,0.5).unproject(camera);
  const dir=vec.sub(camera.position).normalize();
  
  if(Math.abs(dir.z)<0.0001) return;
  const t=(currentShieldZ-camera.position.z)/dir.z;
  const hit=camera.position.clone().addScaledVector(dir,t);
  hit.x=Math.max(-12,Math.min(12,hit.x));
  hit.y=Math.max(0.3,Math.min(14,hit.y));
  shieldGrp.position.copy(hit);
  shieldGrp.lookAt(camera.position);
}

// ---- PROJECTILES ----
// Spawn close to the tower on left/right, at Z=2 (just behind tower face toward camera)
// so they travel a short horizontal distance and definitely hit
function spawnProjectile(){
  const types=['ball','ball','cannonball','crate']; // more balls = more common
  const t=types[Math.floor(Math.random()*types.length)];
  let geo,mat,r,dmg;
  if(t==='ball'){
    geo=new THREE.SphereGeometry(0.3,12,12);
    mat=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff3300,emissiveIntensity:2,roughness:0.2});
    r=0.3; dmg=10;
  } else if(t==='cannonball'){
    geo=new THREE.SphereGeometry(0.4,12,12);
    mat=new THREE.MeshStandardMaterial({color:0xff00ff,roughness:0.1,metalness:0.5,emissive:0xff00ff,emissiveIntensity:2});
    r=0.4; dmg=18;
  } else {
    geo=new THREE.BoxGeometry(0.6,0.6,0.6);
    mat=new THREE.MeshStandardMaterial({color:0xf0c040,roughness:0.8,emissive:0x332200,emissiveIntensity:0.5});
    r=0.45; dmg=25;
  }

  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true;

  // Pick a target block
  const alive=blocks.filter(b=>b.alive);
  if(!alive.length) return;
  const tgt=alive[Math.floor(Math.random()*alive.length)];
  const tx=tgt.mesh.position.x;
  const ty=tgt.mesh.position.y;
  const tz=tgt.mesh.position.z; // ~0

  // Spawn in FRONT of the shield (Z=13-15, toward camera at Z=18),
  // offset sideways so player has to move shield to intercept.
  // Projectiles fly from front-left/right TOWARD the tower (negative Z direction).
  const spawnX=tx+(Math.random()-0.5)*10;  // slightly tighter horizontal spread
  const spawnY=Math.min(ty+6+Math.random()*4, 18); // lower spawn height to keep trajectories blockable
  const spawnZ=currentShieldZ+10+Math.random()*4; // spawn slightly closer to the shield plane

  mesh.position.set(spawnX, spawnY, spawnZ);

  // Speed: travels from Z~14 to Z~0, crossing shield at Z=9
  const baseSpeed=14+level*1.5;
  const dx=tx-spawnX, dz=tz-spawnZ;
  
  // Gravity compensation: aim slightly higher than target based on travel time
  const distXZ = Math.sqrt(dx*dx + dz*dz);
  const time = distXZ / baseSpeed;
  // Cap compensation to prevent high-looping shots for targets at the back of the tower
  const dy = (ty + (0.5 * 4.0 * Math.min(time, 1.5)**2)) - spawnY; 
  const len = Math.sqrt(dx*dx+dy*dy+dz*dz)||1;

  playWhizz();
  scene.add(mesh);
  projectiles.push({
    mesh,
    vx:dx/len*baseSpeed,
    vy:dy/len*baseSpeed,
    vz:dz/len*baseSpeed,
    r, dmg, dead:false,
    shieldBounced:false
  });
  incEl.style.opacity='1'; incT=1200;
}

// ---- PHYSICS ----
function checkSupport(){
  for(const b of blocks){
    if(!b.alive || b.moving) continue;
    if(b.mesh.position.y <= GROUND_Y + 0.05) continue;

    let supported = false;
    const bp = b.mesh.position;
    const bAngle = b.mesh.rotation.y;
    const bHX = (BW * Math.abs(Math.cos(bAngle)) + BD * Math.abs(Math.sin(bAngle))) / 2;
    const bHZ = (BW * Math.abs(Math.sin(bAngle)) + BD * Math.abs(Math.cos(bAngle))) / 2;

    for(const other of blocks){
      if(other === b || !other.alive) continue;
      // Allow support from blocks unless they are falling rapidly downwards
      if(other.moving && other.vy < -1.5) continue;
      const op = other.mesh.position;
      
      if(op.y < bp.y - 0.5 && op.y > bp.y - BH - 0.5){
        const oAngle = other.mesh.rotation.y;
        const oHX = (BW * Math.abs(Math.cos(oAngle)) + BD * Math.abs(Math.sin(oAngle))) / 2;
        const oHZ = (BW * Math.abs(Math.sin(oAngle)) + BD * Math.abs(Math.cos(oAngle))) / 2;

        if(Math.abs(bp.x - op.x) < (bHX + oHX - 0.2) && 
           Math.abs(bp.z - op.z) < (bHZ + oHZ - 0.2)){
          supported = true;
          break;
        }
      }
    }
    if(!supported) {
      b.moving = true;
      // Subtle impulse: blocks should slump and tip naturally, not pop outwards
      b.vx += (Math.random()-0.5) * 0.4;
      b.vz += (Math.random()-0.5) * 0.4;
      b.rx = (Math.random()-0.5) * 1.5;
      b.ry = (Math.random()-0.5) * 1.5;
      b.rz = (Math.random()-0.5) * 1.5;
    }
  }
}

function stepBlocks(dt){
  for(const b of blocks){
    if(!b.alive||!b.moving) continue;
    b.vy -= 14.0 * dt; // Stronger gravity for weightier feel
    b.vx *= Math.pow(0.9, dt*12); b.vz *= Math.pow(0.9, dt*12);

    // Inter-block collision (repulsion) to prevent falling through each other
    for(const other of blocks){
      if(other === b || !other.alive) continue;
      const dx = b.mesh.position.x - other.mesh.position.x;
      const dy = b.mesh.position.y - other.mesh.position.y;
      const dz = b.mesh.position.z - other.mesh.position.z;
      const distSq = dx*dx + dy*dy + dz*dz;
      if(distSq < 16.0){ // tighter collision radius
        const dist = Math.sqrt(distSq) || 0.1;
        const force = (4.0 - dist) * 0.35; // Lower repulsion for better stability
        b.vx += (dx/dist) * force;
        b.vy += (dy/dist) * force;
        b.vz += (dz/dist) * force;
        if(force > 0.3 && Math.random() < 0.15) playClack(force);
        // Much higher threshold to wake up neighbors (prevents the 'exploding tower' bug)
        if(!other.moving && force > 0.75) other.moving = true;
      }
    }

    b.mesh.position.x+=b.vx*dt; b.mesh.position.y+=b.vy*dt; b.mesh.position.z+=b.vz*dt;
    b.mesh.rotation.x+=b.rx*dt; b.mesh.rotation.y+=b.ry*dt; b.mesh.rotation.z+=b.rz*dt;
    b.rx*=Math.pow(0.88,dt*12); b.ry*=Math.pow(0.88,dt*12); b.rz*=Math.pow(0.88,dt*12);
    if(b.mesh.position.y<=GROUND_Y){
      const impact = Math.abs(b.vy);
      b.mesh.position.y=GROUND_Y; b.vy*=-0.18;
      if(impact > 2.0) playClack(impact/10);
      if(Math.abs(b.vy)<0.25&&Math.abs(b.vx)<0.08&&Math.abs(b.vz)<0.08){
        b.vy=0;b.vx=0;b.vz=0;b.rx=0;b.rz=0;b.moving=false;
      }
    }
    if(Math.abs(b.mesh.position.x)>14||Math.abs(b.mesh.position.z)>14||b.mesh.position.y<-5){
      b.alive=false; scene.remove(b.mesh);
    }
  }
}

function impactBlock(b,nx,ny,nz,spd){
  b.moving=true;
  b.vx+=nx*spd*1.2; b.vy+=Math.max(ny*spd*0.3,0)+1.8; b.vz+=nz*spd*1.2;
  b.rx=(Math.random()-0.5)*8; b.ry=(Math.random()-0.5)*8; b.rz=(Math.random()-0.5)*8;
}

function stepProjectiles(dt){
  for(const p of projectiles){
    if(p.dead) continue;

    const px0=p.mesh.position.x, py0=p.mesh.position.y, pz0=p.mesh.position.z;

    // Light gravity on projectiles
    p.vy-=4.0*dt;
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.y+=p.vy*dt;
    p.mesh.position.z+=p.vz*dt;
    p.mesh.rotation.x+=dt*3; p.mesh.rotation.y+=dt*2;

    const pp=p.mesh.position;

    // Kill if out of bounds
    if(pp.y<-8||Math.abs(pp.x)>45||pp.z>currentShieldZ+20||pp.z<-25){
      p.dead=true; scene.remove(p.mesh); continue;
    }

    // ---- SHIELD COLLISION ----
    // Check every frame, not gated by cooldown for detection (cooldown only prevents score spam)
    if(!p.shieldBounced){
      const sp=shieldGrp.position;
      const sdx=pp.x-sp.x, sdy=pp.y-sp.y;
      const distXY=Math.sqrt(sdx*sdx+sdy*sdy);
      // Use a "thick disk" collision relative to the current dynamic shield plane
      const zDist=Math.abs(pp.z-sp.z);
      
      if(zDist < 1.5 && distXY < 1.35 + p.r){
        const dist=Math.sqrt(sdx*sdx+sdy*sdy+(pp.z-sp.z)**2)||1;
        const sn=new THREE.Vector3().subVectors(camera.position, shieldGrp.position).normalize();
        const dot=p.vx*sn.x+p.vy*sn.y+p.vz*sn.z;
        
        // Reflect velocity if moving toward shield
        if(dot < 0){
          p.vx-=2*dot*sn.x;
          p.vy-=2*dot*sn.y;
          p.vz-=2*dot*sn.z;
        }
        // Add a strong kick away from shield to repel
        p.vx+=(sdx/dist)*5;
        p.vy+=(sdy/dist)*5+3;
        p.vz=Math.abs(p.vz)+4; // ensure it moves away from tower
        p.shieldBounced=true; // prevent multi-bounce on same projectile
        if(shieldCD<=0){
          score+=15; scEl.textContent=score;
          shieldCD=400;
          playDeflect();
        }
        // Flash shield
        shieldGrp.children[0].material.emissiveIntensity=3;
        shieldGrp.children[1].material.opacity=0.75;
        setTimeout(()=>{
          if(shieldGrp){
            shieldGrp.children[0].material.emissiveIntensity=0.8;
            shieldGrp.children[1].material.opacity=0.35;
          }
        },150);
        continue;
      }
    }

    // ---- BLOCK COLLISION ----
    let hit=false;
    for(const b of blocks){
      if(!b.alive) continue;
      const bp=b.mesh.position;
      const ex=BW/2+p.r, ey=BH/2+p.r, ez=BD/2+p.r;
      if(Math.abs(pp.x-bp.x)<ex && Math.abs(pp.y-bp.y)<ey && Math.abs(pp.z-bp.z)<ez){
        const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy+p.vz*p.vz);
        const ddx=bp.x-pp.x, ddy=bp.y-pp.y, ddz=bp.z-pp.z;
        const dl=Math.sqrt(ddx*ddx+ddy*ddy+ddz*ddz)||1;
        playImpact(p.type);
        impactBlock(b,ddx/dl,ddy/dl,ddz/dl,spd*1.15);
        hit=true; break;
      }
    }
    if(hit){p.dead=true; scene.remove(p.mesh);}
  }
  projectiles=projectiles.filter(p=>!p.dead);
}

// ---- GAME LOOP ----
function loop(now){
  raf=requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,0.05); lastT=now;

  shieldCD=Math.max(0,shieldCD-dt*1000);
  sfbEl.style.width=(shieldCD<=0?100:Math.max(0,100-shieldCD/400*100))+'%';
  sfbEl.style.background=shieldCD>0?'#ff9800':'#42a5f5';

  shotClock+=dt*1000;
  if(shotClock>=nextShot){
    spawnProjectile(); shotClock=0;
    // Increase frequency faster as levels progress
    nextShot=Math.max(400,2200-level*180)+Math.random()*700;
  }

  if(incT>0){incT-=dt*1000; if(incT<=0) incEl.style.opacity='0';}

  updateShieldPos();
  shieldGrp.scale.setScalar(1+Math.sin(now*0.004)*0.03);

  stepProjectiles(dt);
  checkSupport();
  stepBlocks(dt);

  levelTime+=dt;
  const rem=Math.max(0,30-levelTime);
  tmEl.textContent=`EXTRACTION_ETA: ${Math.ceil(rem)}s`;
  if(levelTime>=30) return doLevelWin();

  const structureAlive = blocks.some(b => b.alive && b.mesh.position.y > GROUND_Y + 0.5);
  
  // Game ends if no blocks remain above the ground layer
  if(!structureAlive) doEndGame();

  renderer.render(scene,camera);
}

function doLevelWin(){
  if(gameOver) return;
  gameOver=true; running=false;
  shotClock=-999999; gc.style.cursor='default';
  playFanfare();
  score += level * 150;
  overlay.style.display='flex';
  overlay.innerHTML=`
    <div style="font-family:'Black Ops One', cursive;font-size:48px;color:#4caf50;margin-bottom:4px;letter-spacing:2px;text-shadow:4px 4px 0 #000;">SURVIVED!</div>
    <div style="background:repeating-linear-gradient(-45deg, #4caf50, #4caf50 10px, #111 10px, #111 20px);width:100%;height:12px;margin-bottom:20px;border-top:2px solid #000;border-bottom:2px solid #000;"></div>
    <div style="color:#fff;font-size:32px;margin-bottom:6px;font-weight:bold;">TOTAL_SCORE: ${score}</div>
    <div style="color:#aaa;font-size:14px;margin-bottom:24px;letter-spacing:2px;">SECTOR ${level} SECURED</div>
    <button id="vb" style="background:linear-gradient(180deg, #f0c040 0%, #d97706 100%);color:#111;border:2px solid #000;padding:16px 48px;font-size:20px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:4px;box-shadow:0 4px 0 #92400e, 0 10px 20px rgba(0,0,0,0.4);">▶ NEXT SECTOR</button>
  `;
  document.getElementById('vb').onclick=()=>{ level++; nextLevel(); };
}

function doEndGame(){
  if(gameOver) return;
  gameOver=true; running=false;
  shotClock = -999999; // stop spawning immediately
  gc.style.cursor='default';
  
  // Delay the end screen so the user can watch the tower collapse
  setTimeout(() => {
    cancelAnimationFrame(raf);
    showEndScreen();
  }, 2500);
}

function showEndScreen(){
  cv.style.display='none'; hud.style.display='none';
  overlay.style.display='flex';
  overlay.innerHTML=`
    <div style="font-family:'Black Ops One', cursive;font-size:48px;color:#f44336;margin-bottom:4px;letter-spacing:2px;text-shadow:4px 4px 0 #000;">MISSION FAILED</div>
    <div style="background:repeating-linear-gradient(-45deg, #f44336, #f44336 10px, #111 10px, #111 20px);width:100%;height:12px;margin-bottom:20px;border-top:2px solid #000;border-bottom:2px solid #000;"></div>
    <div style="color:#fff;font-size:32px;margin-bottom:6px;font-weight:bold;">FINAL_SCORE: ${score}</div>
    <div style="margin-bottom:20px;display:flex;gap:8px;">
      <input id="pn" placeholder="OPERATOR NAME" maxlength="10" style="background:#111;border:1px solid #444;color:#f0c040;padding:10px;font-family:'Oswald';font-weight:bold;text-align:center;outline:none;">
      <button id="svb" style="background:#4caf50;color:#fff;border:none;padding:0 20px;border-radius:4px;cursor:pointer;font-weight:bold;">SAVE</button>
    </div>
    <div id="lbr">${renderLB()}</div>
    <button id="rb" style="background:linear-gradient(180deg, #f0c040 0%, #d97706 100%);color:#111;border:2px solid #000;padding:16px 48px;font-size:20px;font-weight:bold;border-radius:4px;cursor:pointer;letter-spacing:4px;box-shadow:0 4px 0 #92400e, 0 10px 20px rgba(0,0,0,0.4);">▶ REBOOT MISSION</button>
  `;
  document.getElementById('svb').onclick=()=>{
    saveScore(document.getElementById('pn').value, score);
    document.getElementById('lbr').innerHTML=renderLB();
    document.getElementById('svb').disabled=true;
    document.getElementById('svb').style.opacity=0.5;
  };
  document.getElementById('rb').onclick=()=>{ score=0; level=1; towerType='jenga'; nextLevel(); };
}

function nextLevel(){
  try{ getAu().resume(); }catch(e){}
  if(raf) cancelAnimationFrame(raf);
  projectiles.forEach(p=>scene.remove(p.mesh)); projectiles=[];
  
  // Randomize mission structure for Level 2 and beyond
  const missionTypes = ['jenga', 'pyramid', 'tower', 'bridge', 'wall', 'round', 'spiral', 'twin', 'octagon', 'zigzag', 'cross', 'cage'];
  if (level > 1) {
    towerType = missionTypes[Math.floor(Math.random() * missionTypes.length)];
  } else {
    towerType = 'jenga'; // Sector 1 is always Jenga
  }

  shieldCD=0; shotClock=0; nextShot=2200; levelTime=0;
  gameOver=false;
  scEl.textContent='0'; lvEl.textContent='1';
  overlay.style.display='none';
  gc.style.cursor='none';
  cv.style.display='block'; hud.style.display='block';
  buildTower(); buildShield();
  running=true; lastT=performance.now(); loop(lastT);
}

function startGame(){
  score=0; level=1; towerType='jenga';
  nextLevel();
}

// Engine is ready, bind the start button
const startBtn = document.getElementById('sb');
startBtn.textContent = "▶ INITIALISE";
startBtn.onclick = nextLevel;

document.addEventListener('mousemove',e=>{mx=e.clientX; my=e.clientY;});

// Mobile touch support
document.addEventListener('touchstart',e=>{
  if(e.touches[0]){mx=e.touches[0].clientX; my=e.touches[0].clientY;}
}, {passive:true});
document.addEventListener('touchmove',e=>{
  if(e.touches[0]){mx=e.touches[0].clientX; my=e.touches[0].clientY;}
}, {passive:true});

window.addEventListener('resize',()=>{
  W=gc.clientWidth; H=gc.clientHeight;
  renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
});
})();
}); // end waitForThree
</script>
